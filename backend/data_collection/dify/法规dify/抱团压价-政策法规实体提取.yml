    - data:
        code: "def main(iteration_output: list, text_blocks: list) -> dict:\n    import\
          \ json\n    import re\n    import time\n    \"\"\"\n    输入：\n    - iteration_output:\
          \ LLM抽取的结构化实体数组\n    - text_blocks: 原始分块文本数组（包含完整条款内容）\n    \n    两个数组索引一一对应\n\
          \    \"\"\"\n    nodes = []\n    edges = []\n    node_map = {}      # 节点去重：key=\"\
          label:name\"\n    edge_set = set()   # 关系去重：key=\"start_id|end_id|label\"\
          \n    \n    # 预定义关系抽取规则\n    relation_rules = {\n        (\"Title\", \"\
          Chapter\"): \"包含\",\n        (\"Chapter\", \"Section\"): \"包含\",\n     \
          \   (\"Section\", \"AdvantageHolder\"): \"包含违规主体\",\n        (\"Section\"\
          , \"DisadvantageHolder\"): \"包含受害主体\",\n        (\"Section\", \"RegulatoryAuthority\"\
          ): \"包含监管机构\",\n        (\"AdvantageHolder\", \"DisadvantageHolder\"): \"\
          侵害\",\n        (\"AdvantageHolder\", \"Action\"): \"实施\",\n        (\"RegulatoryAuthority\"\
          , \"AdvantageHolder\"): \"监管\",\n        (\"RegulatoryAuthority\", \"Law\"\
          ): \"依照\",\n        (\"RegulatoryAuthority\", \"PunishmentMeasure\"): \"\
          处以\",\n        (\"AdvantageHolder\", \"PunishmentMeasure\"): \"受到处罚\"\n\
          \    }\n    \n    def get_timestamp_id(prefix):\n        return f\"{prefix}{int(time.time()\
          \ * 1000000)}\"\n    \n    def get_or_create_node(label, name, content=None):\n\
          \        \"\"\"获取或创建节点，保证同一name+label只创建一次\"\"\"\n        key = f\"{label}:{name}\"\
          \n        if key in node_map:\n            return node_map[key]\n      \
          \  \n        node_id = get_timestamp_id(\"E\")\n        node = {\n     \
          \       \"type\": \"node\",\n            \"id\": node_id,\n            \"\
          labels\": [label],\n            \"properties\": {\"name\": name}\n     \
          \   }\n        if content and label == \"Section\":\n            node[\"\
          properties\"][\"content\"] = content\n            \n        nodes.append(node)\n\
          \        node_map[key] = node_id\n        return node_id\n    \n    def\
          \ create_edge(start_id, start_label, end_id, end_label, relation):\n   \
          \     \"\"\"创建关系边，自动去重\"\"\"\n        # 使用规则定义的关系\n        relation = relation_rules.get((start_label,\
          \ end_label), relation)\n        \n        edge_key = f\"{start_id}|{end_id}|{relation}\"\
          \n        if edge_key in edge_set:\n            return\n        \n     \
