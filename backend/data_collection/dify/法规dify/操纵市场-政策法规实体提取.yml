    - data:
        code: "def main(iteration_output: list, text_blocks: list) -> dict:\n    import\
          \ json\n    import re\n    import time\n    \"\"\"\n    输入：\n    - iteration_output:\
          \ LLM抽取的结构化实体数组\n    - text_blocks: 原始分块文本数组（包含完整条款内容）\n    \n    两个数组索引一一对应\n\
          \    \"\"\"\n    nodes = []\n    edges = []\n    node_map = {}      # 节点去重：key=\"\
          label:name\"\n    edge_set = set()   # 关系去重：key=\"start_id|end_id|label\"\
          \n    \n    # 预定义关系抽取规则\n    relation_rules = {\n        (\"Title\", \"\
          Chapter\"): \"包含\",\n        (\"Chapter\", \"Section\"): \"包含\",\n     \
          \   (\"Section\", \"Actor\"): \"包含主体\",\n        (\"Section\", \"RegulatoryAuthority\"\
          ): \"包含监管机构\",\n        (\"Actor\", \"Advantage\"): \"具有\",\n        (\"\
          Actor\", \"Account\"): \"控制\",\n        (\"Actor\", \"Means\"): \"做出\",\n\
          \        (\"Means\", \"Influence\"): \"旨在导致\",\n        (\"Means\", \"Advantage\"\
          ): \"需借助\",\n        (\"RegulatoryAuthority\", \"Actor\"): \"监管\",\n   \
          \     (\"RegulatoryAuthority\", \"Law\"): \"依照\"\n    }\n    \n    def get_timestamp_id(prefix):\n\
          \        return f\"{prefix}{int(time.time() * 1000000)}\"\n    \n    def\
          \ get_or_create_node(label, name, content=None):\n        \"\"\"获取或创建节点，保证同一name+label只创建一次\"\
          \"\"\n        key = f\"{label}:{name}\"\n        if key in node_map:\n \
          \           return node_map[key]\n        \n        node_id = get_timestamp_id(\"\
          E\")\n        node = {\n            \"type\": \"node\",\n            \"\
          id\": node_id,\n            \"labels\": [label],\n            \"properties\"\
          : {\"name\": name}\n        }\n        if content and label == \"Section\"\
          :\n            node[\"properties\"][\"content\"] = content\n           \
          \ \n        nodes.append(node)\n        node_map[key] = node_id\n      \
          \  return node_id\n    \n    def create_edge(start_id, start_label, end_id,\
          \ end_label, relation):\n        \"\"\"创建关系边，自动去重\"\"\"\n        # 使用规则定义的关系\n\
          \        relation = relation_rules.get((start_label, end_label), relation)\n\
          \        \n        edge_key = f\"{start_id}|{end_id}|{relation}\"\n    \
          \    if edge_key in edge_set:\n            return\n        \n        edge_set.add(edge_key)\n\
          \        edge_id = get_timestamp_id(\"R\")\n        edge = {\n         \
          \   \"id\": edge_id,\n            \"type\": \"relationship\",\n        \
          \    \"label\": relation,\n            \"start\": {\"id\": start_id, \"\
          labels\": [start_label]},\n            \"end\": {\"id\": end_id, \"labels\"\
          : [end_label]}\n        }\n        edges.append(edge)\n    \n    # 确保两个数组长度一致\n\
          \    if len(iteration_output) != len(text_blocks):\n        min_len = min(len(iteration_output),\
          \ len(text_blocks))\n        iteration_output = iteration_output[:min_len]\n\
          \        text_blocks = text_blocks[:min_len]\n    \n    # 遍历处理每一对数据\n  \
          \  for i in range(len(iteration_output)):\n        llm_output = iteration_output[i]\n\
          \        original_block = text_blocks[i]\n        \n        # 提取文档结构信息\n\
          \        doc_match = re.search(r'文档：([^\\n]+)', original_block)\n      \
