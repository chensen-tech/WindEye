    - data:
        code: "def main(iteration_output: list, text_blocks: list) -> dict:\n    import\
          \ json\n    import re\n    import time\n    \"\"\"\n    输入：\n    - iteration_output:\
          \ LLM抽取的结构化实体数组\n    - text_blocks: 原始分块文本数组（包含完整条款内容）\n    \n    两个数组索引一一对应\n\
          \    \"\"\"\n    nodes = []\n    edges = []\n    node_map = {}      # 节点去重：key=\"\
          label:name\"\n    edge_set = set()   # 关系去重：key=\"start_id|end_id|label\"\
          \n    \n    def get_timestamp_id(prefix):\n        return f\"{prefix}{int(time.time()\
          \ * 1000000)}\"\n    \n    def get_or_create_node(label, name, content=None):\n\
          \        \"\"\"获取或创建节点，保证同一name+label只创建一次\"\"\"\n        key = f\"{label}:{name}\"\
          \n        if key in node_map:\n            return node_map[key]\n      \
          \  \n        node_id = get_timestamp_id(\"E\")\n        node = {\n     \
          \       \"type\": \"node\",\n            \"id\": node_id,\n            \"\
          labels\": [label],\n            \"properties\": {\"name\": name}\n     \
          \   }\n        if content and label == \"Section\":\n            node[\"\
          properties\"][\"content\"] = content\n            \n        nodes.append(node)\n\
          \        node_map[key] = node_id\n        return node_id\n    \n    def\
          \ create_edge(start_id, start_label, end_id, end_label, relation):\n   \
          \     \"\"\"创建关系边，自动去重\"\"\"\n        edge_key = f\"{start_id}|{end_id}|{relation}\"\
          \n        if edge_key in edge_set:\n            return  # 已存在，跳过\n     \
          \   \n        edge_set.add(edge_key)\n        edge_id = get_timestamp_id(\"\
          R\")\n        edge = {\n            \"id\": edge_id,\n            \"type\"\
          : \"relationship\",\n            \"label\": relation,\n            \"start\"\
          : {\"id\": start_id, \"labels\": [start_label]},\n            \"end\": {\"\
          id\": end_id, \"labels\": [end_label]}\n        }\n        edges.append(edge)\n\
          \    \n    # 确保两个数组长度一致\n    if len(iteration_output) != len(text_blocks):\n\
          \        # 如果不一致，以较短的为准，并记录警告\n        min_len = min(len(iteration_output),\
          \ len(text_blocks))\n        iteration_output = iteration_output[:min_len]\n\
          \        text_blocks = text_blocks[:min_len]\n    \n    # 遍历处理每一对数据\n  \
          \  for i in range(len(iteration_output)):\n        llm_output = iteration_output[i]\
          \  # LLM抽取结果\n        original_block = text_blocks[i]   # 原始分块（含完整内容）\n\
          \        \n        # ========== 从原始block中提取完整内容和文档结构 ==========\n      \
          \  \n        # 提取文档标题\n        doc_match = re.search(r'文档：([^\\n]+)', original_block)\n\
          \        doc_title = doc_match.group(1).strip() if doc_match else \"\"\n\
          \        \n        # 提取章节标题\n        chap_match = re.search(r'章节：([^\\n]+)',\
          \ original_block)\n        chap_title = chap_match.group(1).strip() if chap_match\
          \ else \"\"\n        \n        # 提取条款标题（\"条款：第一条 xxx\"）\n        section_match\
          \ = re.search(r'条款：([^\\n]+)', original_block)\n        section_full = section_match.group(1).strip()\
