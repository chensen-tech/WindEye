    - data:
        code: "import json\n\ndef main(event: str) -> dict:\n    results = []\n  \
          \  \n    for line in event.strip().split('\\n'):\n        line = line.strip()\n\
          \        if not line:\n            continue\n            \n        item\
          \ = json.loads(line)\n        \n        if item.get('type') == 'node' and\
          \ 'EVENT' in item.get('labels', []):\n            # 将每个事件转为 JSON 字符串\n \
          \           event_obj = {\n                'e_id': str(item.get('id', '')),\n\
          \                'e_text': item.get('properties', {}).get('text', '')\n\
          \            }\n            results.append(json.dumps(event_obj, ensure_ascii=False))\n\
          \    \n    return {\n        'events': results\n    }"
