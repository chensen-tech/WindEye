    - data:
        code: "import json\nimport random\n\ndef main(raw_input: str) -> dict:\n \
          \   \"\"\"\n    对\"映射法律法规\"节点的输出进行ID修正 + JSON压缩：\n    - \"映射法规\"关系的 id →\
          \ 真随机数（带防假数字过滤）\n    - 保持其他所有字段不变\n    - 最终输出严格单行 JSONL（无缩进、无换行）\n    \"\
          \"\"\n    if not raw_input or raw_input.strip() == 'SKIP_NO_MATCH':\n  \
          \      return {'corrected_text': ''}\n    \n    if not raw_input or not\
          \ raw_input.strip():\n        return {\n            'corrected_text': ''\n\
          \        }\n    \n    llm_raw_output = raw_input.strip()\n    lines = [line.strip()\
          \ for line in llm_raw_output.split('\\n') if line.strip()]\n    if not lines:\n\
          \        return {\n            'corrected_text': ''\n        }\n    \n \
          \   # ------------------- 真随机ID生成器 -------------------\n    used_ids = set()\n\
          \    \n    def gen_true_random_id(prefix: str, digits: int) -> str:\n  \
          \      \"\"\"生成带防假数字过滤的真随机ID\"\"\"\n        attempts = 0\n        while\
          \ attempts < 1000:\n            num = random.randint(10**(digits-1), 10**digits\
          \ - 1)\n            s = str(num)\n            # 严格过滤假数字模式\n            if\
          \ (len(set(s)) <= 2 or\n                s in [\"123456789\", \"987654321\"\
          , \"5201314\", \"888888888\", \"000000000\"] or\n                \"1234\"\
          \ in s or \"4321\" in s or \"520\" in s or \"1314\" in s):\n           \
          \     attempts += 1\n                continue\n            candidate = f\"\
          {prefix}_{num}\"\n            if candidate not in used_ids:\n          \
          \      used_ids.add(candidate)\n                return candidate\n     \
          \   # 兜底\n        candidate = f\"{prefix}_{random.randint(10**(digits-1),\
          \ 10**digits-1)}\"\n        used_ids.add(candidate)\n        return candidate\n\
          \    \n    # ------------------- 处理每一行 + 压缩为单行 -------------------\n   \
          \ result_lines = []\n    \n    for line in lines:\n        try:\n      \
          \      obj = json.loads(line)\n        except json.JSONDecodeError:\n  \
          \          result_lines.append(line)\n            continue\n        \n \
          \       # 只处理\"映射法规\"关系，重新赋值其 id\n        if obj.get('type') == 'relationship'\
          \ and obj.get('label') == '映射法规':\n            obj['id'] = gen_true_random_id(\"\
          r\", 10)\n        \n        # 压缩为单行 JSON\n        compact = json.dumps(obj,\
          \ separators=(',', ':'), ensure_ascii=False)\n        result_lines.append(compact)\n\
          \    \n    corrected_text = '\\n'.join(result_lines)\n    \n    return {\n\
          \        'corrected_text': corrected_text\n    }"
        code_language: python3
