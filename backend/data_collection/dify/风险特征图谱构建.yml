    - data:
        code: "import json\nimport random\n\ndef main(raw_input: str) -> dict:\n \
          \   \"\"\"\n    对特征因子提取节点的输出进行ID修正：\n    1. New_RF_xxx → 真正的随机数（带防假数字过滤）\n\
          \    2. New_RFT_xxx → 与对应 New_RF 相同的数字（仅改前缀）\n    3. RFT_非标准格式 → 也统一修正\n\
          \    4. 关系节点的 id → 真随机数（带防假数字过滤）\n    5. 保持所有关联关系一致\n    \"\"\"\n    if\
          \ not raw_input or raw_input.strip() == 'SKIP_NORMAL':\n        return {'corrected_text':\
          \ ''}\n\n    if not raw_input or not raw_input.strip():\n        return\
          \ {\n            'corrected_text': ''\n        }\n    \n    llm_raw_output\
          \ = raw_input.strip()\n    lines = [line.strip() for line in llm_raw_output.split('\\\
          n') if line.strip()]\n    if not lines:\n        return {\n            'corrected_text':\
          \ ''\n        }\n    \n    # ------------------- 收集所有对象 -------------------\n\
          \    nodes = []           # 所有节点对象\n    relationships = []     # 所有关系对象\n\
          \    original_lines = []   # 保留原始顺序和类型标记\n    \n    for line in lines:\n\
          \        try:\n            obj = json.loads(line)\n            original_lines.append(obj)\n\
          \            if obj.get('type') == 'node':\n                nodes.append(obj)\n\
          \            elif obj.get('type') == 'relationship':\n                relationships.append(obj)\n\
          \        except json.JSONDecodeError:\n            original_lines.append(line)\n\
          \    \n    # ------------------- 真随机ID生成器 -------------------\n    id_mapping\
          \ = {}       # 旧ID → 新ID\n    used_ids = set()      # 防止重复\n    \n    def\
          \ gen_true_random_id(prefix: str, digits: int) -> str:\n        \"\"\"生成带防假数字过滤的真随机ID\"\
          \"\"\n        attempts = 0\n        while attempts < 1000:\n           \
          \ num = random.randint(10**(digits-1), 10**digits - 1)\n            s =\
          \ str(num)\n            # 严格过滤假数字模式\n            if (len(set(s)) <= 2 or\n\
          \                s in [\"123456789\", \"987654321\", \"5201314\", \"888888888\"\
          , \"000000000\"] or\n                \"1234\" in s or \"4321\" in s or \"\
          520\" in s or \"1314\" in s):\n                attempts += 1\n         \
          \       continue\n            candidate = f\"{prefix}_{num}\"\n        \
          \    if candidate not in used_ids:\n                used_ids.add(candidate)\n\
          \                return candidate\n        # 兜底\n        candidate = f\"\
          {prefix}_{random.randint(10**(digits-1), 10**digits-1)}\"\n        used_ids.add(candidate)\n\
          \        return candidate\n    \n    # ------------------- 2.1 处理 RiskFactor\
          \ 节点（New_RF_ 开头的）-------------------\n    rf_id_mapping = {}    # 旧RF_ID\
          \ → 新RF_ID（用于后续关联RFT）\n    \n    for node in nodes:\n        labels = node.get('labels',\
          \ [])\n        old_id = node.get('id', '')\n        \n        if 'RiskFactor'\
          \ in labels and old_id.startswith('New_RF_'):\n            new_id = gen_true_random_id(\"\
          New_RF\", 10)\n            id_mapping[old_id] = new_id\n            rf_id_mapping[old_id]\
          \ = new_id\n    \n    # ------------------- 2.2 处理 RiskFeature 节点 -------------------\n\
          \    for node in nodes:\n        labels = node.get('labels', [])\n     \
          \   old_id = node.get('id', '')\n        \n        if 'RiskFeature' not\
          \ in labels:\n            continue\n            \n        # 情况A：New_RFT_\
          \ 开头 → 需要找到对应的RF，使用相同数字\n        if old_id.startswith('New_RFT_'):\n   \
          \         old_digit = old_id.replace('New_RFT_', '')\n            corresponding_rf\
          \ = None\n            for old_rf, new_rf in rf_id_mapping.items():\n   \
          \             if old_rf.endswith(old_digit):\n                    corresponding_rf\
          \ = new_rf\n                    break\n            \n            if corresponding_rf:\n\
          \                new_digit = corresponding_rf.replace('New_RF_', '')\n \
          \               new_id = f\"New_RFT_{new_digit}\"\n            else:\n \
          \               new_id = gen_true_random_id(\"New_RFT\", 10)\n         \
          \   id_mapping[old_id] = new_id\n            \n        # 情况B：RFT_ 开头但不是标准格式\n\
          \        elif old_id.startswith('RFT_'):\n            parts = old_id.replace('RFT_',\
          \ '').split('_')\n            is_standard = all(p.isdigit() for p in parts\
          \ if p)\n            \n            if not is_standard:\n               \
          \ corresponding_rf_id = None\n                for rel in relationships:\n\
          \                    if rel.get('label') == '构成':\n                    \
          \    end_node = rel.get('end', {})\n                        if end_node.get('id')\
          \ == old_id:\n                            start_node = rel.get('start',\
          \ {})\n                            corresponding_rf_id = start_node.get('id')\n\
          \                            break\n                \n                if\
          \ corresponding_rf_id and corresponding_rf_id in rf_id_mapping:\n      \
          \              new_digit = rf_id_mapping[corresponding_rf_id].replace('New_RF_',\
          \ '')\n                    new_id = f\"New_RFT_{new_digit}\"\n         \
          \       else:\n                    new_id = gen_true_random_id(\"New_RFT\"\
          , 10)\n                id_mapping[old_id] = new_id\n            # 标准格式（RFT_001_001_001）保持不变\n\
          \    \n    # ------------------- 2.3 处理关系节点的 ID -------------------\n  \
          \  for rel in relationships:\n        old_id = rel.get('id', '')\n     \
          \   label = rel.get('label', '')\n        \n        if label in ['触发', '构成']:\n\
          \            if label == '构成':\n                start_id = rel.get('start',\
          \ {}).get('id', '')\n                end_id = rel.get('end', {}).get('id',\
          \ '')\n                new_start = id_mapping.get(start_id, start_id)\n\
          \                new_end = id_mapping.get(end_id, end_id)\n            \
          \    new_id = f'{new_start}_{new_end}'\n                id_mapping[old_id]\
          \ = new_id\n            else:\n                # \"触发\"关系：10位真随机数字\n   \
          \             new_id = gen_true_random_id(\"r\", 10)\n                id_mapping[old_id]\
          \ = new_id\n    \n    # ------------------- 3. 应用映射，更新所有对象 -------------------\n\
          \    def update_id_in_obj(obj, old_id, new_id):\n        if obj.get('id')\
          \ == old_id:\n            obj['id'] = new_id\n        \n        props =\
          \ obj.get('properties', {})\n        for key in ['rf_id', 'rft_id', 'e_id']:\n\
          \            if props.get(key) == old_id:\n                props[key] =\
          \ new_id\n        \n        for endpoint in ['start', 'end']:\n        \
          \    if endpoint in obj:\n                if obj[endpoint].get('id') ==\
          \ old_id:\n                    obj[endpoint]['id'] = new_id\n    \n    for\
          \ old_id, new_id in id_mapping.items():\n        for node in nodes:\n  \
          \          update_id_in_obj(node, old_id, new_id)\n        for rel in relationships:\n\
          \            update_id_in_obj(rel, old_id, new_id)\n    \n    # -------------------\
          \ 4. 按原始顺序重新组装输出 -------------------\n    result_lines = []\n    node_idx\
          \ = 0\n    rel_idx = 0\n    \n    for item in original_lines:\n        if\
          \ isinstance(item, dict):\n            if item.get('type') == 'node' and\
          \ node_idx < len(nodes):\n                result_lines.append(json.dumps(nodes[node_idx],\
          \ ensure_ascii=False))\n                node_idx += 1\n            elif\
          \ item.get('type') == 'relationship' and rel_idx < len(relationships):\n\
          \                result_lines.append(json.dumps(relationships[rel_idx],\
          \ ensure_ascii=False))\n                rel_idx += 1\n            else:\n\
          \                result_lines.append(json.dumps(item, ensure_ascii=False))\n\
          \        else:\n            result_lines.append(str(item))\n    \n    corrected_text\
          \ = '\\n'.join(result_lines)\n    \n    return {\n        'corrected_text':\
          \ corrected_text\n    }"
        code_language: python3
        outputs:
          corrected_text:
            children: null
            type: string
