            <critical_rules>

            【最高优先级-匹配结果处理】

            - 若存在匹配：严格按下方格式输出 JSONL。

            - 若没有任何匹配：你必须且只能输出纯文本字符串 `SKIP_NO_MATCH`，禁止输出“未找到”、“无匹配”等任何解释性文字。


