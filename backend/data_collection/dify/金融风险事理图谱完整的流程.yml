    - data:
        code: "import json\nimport random\nfrom typing import Dict, Any, List\n\n\
          def main(raw_input: str) -> dict:\n    \"\"\"\n    【金融风险事理图谱终极融合生成器】ID生成器\n\
          \    专为正确JSON格式设计的高效版本\n    \"\"\"\n    raw_text = raw_input.strip()\n \
          \   if not raw_text:\n        return {\"result\": \"\"}\n\n    lines = [line.strip()\
          \ for line in raw_text.split('\\n') if line.strip()]\n    if not lines:\n\
          \        return {\"result\": \"\"}\n\n    # ID映射表\n    id_mapping: Dict[str,\
          \ str] = {}\n    \n    def generate_random_id(prefix: str, length: int)\
          \ -> str:\n        \"\"\"生成高质量随机ID\"\"\"\n        # 避免使用简单模式\n        avoid_patterns\
          \ = {\n            '123', '321', '456', '654', '789', '987', '000', '111',\
          \ '222', '333',\n            '444', '555', '666', '777', '888', '999', '1234',\
          \ '4321', '5678', '8765'\n        }\n        \n        for _ in range(50):\
          \  # 最多尝试50次\n            # 生成随机数\n            random_num = random.randint(10**(length-1),\
          \ 10**length - 1)\n            num_str = str(random_num)\n            \n\
          \            # 检查是否包含简单模式\n            contains_bad_pattern = any(pattern\
          \ in num_str for pattern in avoid_patterns)\n            \n            #\
          \ 检查数字多样性（至少4个不同数字）\n            digit_diversity = len(set(num_str))\n \
          \           \n            if not contains_bad_pattern and digit_diversity\
          \ >= 3:\n                new_id = f\"{prefix}_{num_str}\"\n            \
          \    if new_id not in id_mapping.values():\n                    return new_id\n\
          \        \n        # 如果尝试失败，使用安全的随机数\n        return f\"{prefix}_{random.randint(10**(length-1),\
          \ 10**length - 1)}\"\n\n    # 第一遍：解析并生成新ID\n    objects = []\n    for line\
          \ in lines:\n        try:\n            obj = json.loads(line)\n        \
          \    objects.append(obj)\n        except json.JSONDecodeError:\n       \
          \     # 跳过格式错误的行\n            continue\n\n    # 生成节点的新ID\n    for obj in\
          \ objects:\n        old_id = obj.get(\"id\", \"\")\n        if not old_id:\n\
          \            continue\n            \n        obj_type = obj.get(\"type\"\
          , \"\")\n        \n        if obj_type == \"node\":\n            labels\
          \ = obj.get(\"labels\", [])\n            if \"COMPANY\" in labels:\n   \
          \             new_id = generate_random_id(\"c\", 9)\n            elif \"\
          PERSON\" in labels:\n                new_id = generate_random_id(\"p\",\
          \ 9)\n            elif \"REGULATOR\" in labels:\n                new_id\
          \ = generate_random_id(\"rg\", 9)\n            elif \"EVENT\" in labels:\n\
          \                new_id = generate_random_id(\"e\", 10)\n            elif\
          \ \"TIME\" in labels:\n                new_id = generate_random_id(\"t\"\
          , 8)\n            else:\n                continue\n                \n  \
          \      elif obj_type == \"relationship\":\n            new_id = generate_random_id(\"\
          r\", 10)\n        else:\n            continue\n            \n        id_mapping[old_id]\
          \ = new_id\n        obj[\"id\"] = new_id\n\n    # 第二遍：更新关系中的ID引用\n    result_lines\
          \ = []\n    for obj in objects:\n        # 处理关系中的引用\n        if obj.get(\"\
          type\") == \"relationship\":\n            # 处理start\n            if isinstance(obj.get(\"\
          start\"), dict):\n                start_id = obj[\"start\"].get(\"id\",\
          \ \"\")\n                if start_id in id_mapping:\n                  \
          \  obj[\"start\"][\"id\"] = id_mapping[start_id]\n            \n       \
          \     # 处理end\n            if isinstance(obj.get(\"end\"), dict):\n    \
          \            end_id = obj[\"end\"].get(\"id\", \"\")\n                if\
          \ end_id in id_mapping:\n                    obj[\"end\"][\"id\"] = id_mapping[end_id]\n\
          \        \n        # 序列化\n        result_lines.append(json.dumps(obj, ensure_ascii=False,\
          \ separators=(',', ':')))\n\n    return {\"result\": \"\\n\".join(result_lines)}"
